# ============================================================
# CAK AI Ecosystem — ALWAYS-ON, all-in-one (Next + sidecar + Chrome).
# Deploy on any free always-on VM (e.g. Oracle Cloud Always-Free):
#   docker compose up -d --build
# Then expose :3000 with a free Cloudflare Tunnel (see DEPLOY.md) for HTTPS.
# Everything runs on localhost INSIDE the container → TikTok/IG/SGE just work.
# ============================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Two env files: the Next app (.env.local) + the scraper sidecar (SERVICE_TOKEN,
    # MS_TOKEN, IG creds). SCRAPER_SERVICE_TOKEN (app) must equal SERVICE_TOKEN (sidecar).
    env_file:
      - ./.env.local
      - ./scraper-service/.env
    environment:
      # In-container the three services talk over localhost.
      - SCRAPER_SERVICE_URL=http://localhost:8900
      - LIGHTPANDA_CDP_URL=http://localhost:9222
    ports:
      - "3000:3000"
    volumes:
      # Persisted headless-Chrome profile — holds the one-time SGE login cookie.
      - ./chrome-profile:/profile
    restart: unless-stopped
